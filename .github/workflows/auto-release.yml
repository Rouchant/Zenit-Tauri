name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - src-tauri/tauri.conf.json
      - src-tauri/Cargo.toml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        id: release_meta
        shell: pwsh
        run: |
          try {
            $version = (Get-Content "package.json" | ConvertFrom-Json).version
            $tauriVersion = (Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json).version
          } catch {
            Write-Error "No se pudo leer la versión: $($_.Exception.Message)"
            exit 1
          }
          
          if ($version -ne $tauriVersion) {
            Write-Error "La versión de package.json ($version) no coincide con tauri.conf.json ($tauriVersion)."
            exit 1
          }
          
          "version=$version" >> $env:GITHUB_OUTPUT
          
          $previousVersion = ""
          $commitCount = [int](git rev-list --count HEAD)
          
          if ($commitCount -gt 1) {
            $previousPackage = git show HEAD^:package.json | ConvertFrom-Json
            $previousVersion = $previousPackage.version
          }
          
          $tagRef = "refs/tags/v$version"
          $tagExists = git ls-remote --tags origin $tagRef
          
          if ($previousVersion -eq $version) {
            "should_release=false" >> $env:GITHUB_OUTPUT
            "reason=noVersionChange" >> $env:GITHUB_OUTPUT
          } elseif ($tagExists) {
            "should_release=false" >> $env:GITHUB_OUTPUT
            "reason=tagAlreadyExists" >> $env:GITHUB_OUTPUT
          } else {
            "should_release=true" >> $env:GITHUB_OUTPUT
            "reason=versionChanged" >> $env:GITHUB_OUTPUT
          }

      - name: Build and create GitHub Release
        if: steps.release_meta.outputs.should_release == 'true'
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Zenit v__VERSION__
          releaseBody: "Release automática generada por GitHub Actions."
          releaseDraft: false
          prerelease: false

      - name: Skip release log
        if: steps.release_meta.outputs.should_release != 'true'
        run: echo "No se generará release para v${{ steps.release_meta.outputs.version }} (motivo:${{ steps.release_meta.outputs.reason }})."

name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - src-tauri/tauri.conf.json
      - src-tauri/Cargo.toml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Resolve release version
        id: release_meta
        shell: pwsh
        run: |
          $version = (Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT

          $tagRef = "refs/tags/v$version"
          $tagExists = git ls-remote --tags origin $tagRef

          if ($tagExists) {
            "should_release=false" >> $env:GITHUB_OUTPUT
          } else {
            "should_release=true" >> $env:GITHUB_OUTPUT
          }

      - name: Build and create GitHub Release
        if: steps.release_meta.outputs.should_release == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Zenit v__VERSION__
          releaseBody: Release automática generada por GitHub Actions.
          releaseDraft: false
          prerelease: false

      - name: Skip release when tag already exists
        if: steps.release_meta.outputs.should_release != 'true'
        run: echo "Release v${{ steps.release_meta.outputs.version }} ya existe. No se generará una nueva."

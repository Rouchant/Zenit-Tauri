name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - src-tauri/tauri.conf.json
      - src-tauri/Cargo.toml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Instalar pnpm antes de Setup Node
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8 # Puedes cambiarlo a la versión que prefieras (9 es la actual estable)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm # Cambiamos npm por pnpm para el caché

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # 2. Usar pnpm para instalar dependencias
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        id: release_meta
        shell: pwsh
        run: |
          $version = (Get-Content "package.json" | ConvertFrom-Json).version
          $tauriVersion = (Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json).version

          if ($version -ne $tauriVersion) {
            Write-Error "La versión de package.json ($version) no coincide con src-tauri/tauri.conf.json ($tauriVersion)."
            exit 1
          }

          "version=$version" >> $env:GITHUB_OUTPUT

          $previousVersion = ""
          $commitCount = [int](git rev-list --count HEAD)
          if ($commitCount -gt 1) {
            $previousPackagePath = git ls-tree --name-only HEAD^ package.json
            if ($previousPackagePath -eq "package.json") {
              $previousPackage = git show HEAD^:package.json
            }
            if ($previousPackage) {
              $previousVersion = ($previousPackage | ConvertFrom-Json).version
            }
          }

          $versionChanged = $true
          if ($previousVersion) {
            $versionChanged = $previousVersion -ne $version
          }

          $tagRef = "refs/tags/v$version"
          $tagExists = git ls-remote --tags origin $tagRef

          if (-not $versionChanged) {
            "should_release=false" >> $env:GITHUB_OUTPUT
            "reason=no_version_change" >> $env:GITHUB_OUTPUT
          } elseif ($tagExists) {
            "should_release=false" >> $env:GITHUB_OUTPUT
            "reason=tag_already_exists" >> $env:GITHUB_OUTPUT
          } else {
            "should_release=true" >> $env:GITHUB_OUTPUT
            "reason=version_changed" >> $env:GITHUB_OUTPUT
          }

      - name: Build and create GitHub Release
        if: steps.release_meta.outputs.should_release == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Zenit v__VERSION__
          releaseBody: Release automática generada por GitHub Actions.
          releaseDraft: false
          prerelease: false

      - name: Skip release when tag already exists
        if: steps.release_meta.outputs.should_release != 'true'
        run: echo "No se generará release para v${{ steps.release_meta.outputs.version }} (motivo: ${{ steps.release_meta.outputs.reason }})."

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        @font-face {
            font-family: 'Outfit';
            src: url('fonts/outfit-300.ttf') format('truetype');
            font-weight: 300;
            font-style: normal;
        }
        @font-face {
            font-family: 'Outfit';
            src: url('fonts/outfit-400.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Outfit';
            src: url('fonts/outfit-600.ttf') format('truetype');
            font-weight: 600;
            font-style: normal;
        }
        @font-face {
            font-family: 'Outfit';
            src: url('fonts/outfit-700.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
        }

        :root {
            --primary: #00f2ff;
            --secondary: #0072ff;
            --bg-dark: #0a0a0c;
        }

        /* Themes matching style.css */
        body.theme-falabella { --primary: #B9D40D; --secondary: #8da10a; }
        body.theme-paris { --primary: #009DE0; --secondary: #007bb0; }
        body.theme-ripley { --primary: #9932cc; --secondary: #7928a1; }
        body.theme-default { --primary: #00f2ff; --secondary: #0072ff; }

        body {
            margin: 0;
            padding: 8px; /* Reduced padding */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: transparent;
            font-family: 'Outfit', sans-serif;
            user-select: none;
            box-sizing: border-box;
        }
        .return-btn {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: #000;
            border: none;
            padding: 16px 40px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-app-region: no-drag; /* Button is specifically NOT draggable */
            white-space: nowrap;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
            z-index: 100;
            will-change: transform, filter;
        }
        .return-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        .btn-icon {
            opacity: 0.9;
        }
        .btn-text {
            line-height: 1.2;
        }
    </style>
</head>
<body class="theme-default">
    <button class="return-btn" onclick="window.electronAPI.restoreApp()">
        <span class="btn-text">Volver a características</span>
        <div class="btn-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 17v4"/>
                <path d="m14.305 7.53.923-.382"/>
                <path d="m15.228 4.852-.923-.383"/>
                <path d="m16.852 3.228-.383-.924"/>
                <path d="m16.852 8.772-.383.923"/>
                <path d="m19.148 3.228.383-.924"/>
                <path d="m19.53 9.696-.382-.924"/>
                <path d="m20.772 4.852.924-.383"/>
                <path d="m20.772 7.148.924.383"/>
<path d="M22 13v2a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7"/>
<path d="M8 21h8"/>
<circle cx="18" cy="6" r="3"/>
            </svg>
        </div>
    </button>

    <script>
        // Apply theme from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const store = urlParams.get('store') || 'none';
        
        document.body.classList.remove('theme-falabella', 'theme-paris', 'theme-ripley', 'theme-default');
        if (store === 'none') {
            document.body.classList.add('theme-default');
        } else {
            document.body.classList.add(`theme-${store}`);
        }
    </script>
</body>
</html>

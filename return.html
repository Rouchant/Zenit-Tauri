<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script>
        // Aplicar el tema lo antes posible para evitar parpadeos (FOUC)
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const store = urlParams.get('store') || 'none';
            const theme = store === 'none' ? 'default' : store;
            document.documentElement.className = 'theme-' + theme;
        })();
    </script>
    <style>
        @font-face {
            font-family: 'Outfit';
            src: url('fonts/outfit-300.ttf') format('truetype');
            font-weight: 300;
            font-style: normal;
        }
        @font-face {
            font-family: 'Outfit';
            src: url('fonts/outfit-400.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Outfit';
            src: url('fonts/outfit-600.ttf') format('truetype');
            font-weight: 600;
            font-style: normal;
        }
        @font-face {
            font-family: 'Outfit';
            src: url('fonts/outfit-700.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
        }

        :root {
            --primary: #00f2ff;
            --secondary: #0072ff;
            --bg-dark: #0a0a0c;
        }

        /* Themes matching style.css */
        .theme-falabella { --primary: #B9D40D; --secondary: #8da10a; }
        .theme-paris { --primary: #009DE0; --secondary: #007bb0; }
        .theme-ripley { --primary: #9932cc; --secondary: #7928a1; }
        .theme-default { --primary: #00f2ff; --secondary: #0072ff; }

        html {
            background: transparent;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: transparent;
            font-family: 'Outfit', sans-serif;
            user-select: none;
            box-sizing: border-box;
        }
        .return-btn {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: #000;
            border: none;
            padding: 18px 27px;
            border-radius: 12px;
            letter-spacing: 1px;
            font-weight: 800;
            font-size: 1.05rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-app-region: no-drag; 
            white-space: nowrap;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 3px 3px rgba(0,0,0,0.2);
            position: relative;
            z-index: 100;
            will-change: transform, filter;
        }
        .return-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        .btn-icon {
            opacity: 0.9;
            margin-top: 4px;
        }
        .btn-text {
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <button id="restore-btn" class="return-btn">
        <span class="btn-text">Ver caracteristicas</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-laptop-minimal-check-icon lucide-laptop-minimal-check"><path d="M2 20h20"/><path d="m9 10 2 2 4-4"/><rect x="3" y="4" width="18" height="12" rx="2"/></svg>
    </button>

    <script type="module">
        import { invoke } from '@tauri-apps/api/core';

        document.getElementById('restore-btn').addEventListener('click', async () => {
            try {
                await invoke('restore_app');
            } catch (err) {
                console.error('Failed to restore app:', err);
            }
        });
    </script>
</body>
</html>
